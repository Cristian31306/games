<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorah Games Hub | Premium Light</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-light: #f8fafc;
            --bg-card: #ffffff;
            --accent-primary: #2563eb; /* Azul más oscuro para mejor contraste */
            --accent-secondary: #7c3aed;
            --text-main: #0f172a;
            --text-dim: #475569; /* Gris más oscuro para contraste */
            --sidebar-width: 80px;
            --glass: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(0, 0, 0, 0.08);
            --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.04), 0 2px 10px rgba(0, 0, 0, 0.02);
            --shadow-strong: 0 20px 50px rgba(0, 0, 0, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            overflow-x: hidden;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: #ffffff;
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 0;
            border-right: 1px solid var(--glass-border);
            z-index: 100;
        }

        .nav-logo {
            font-size: 1.8rem;
            color: var(--accent-primary);
            margin-bottom: 3rem;
            transition: transform 0.3s ease;
        }

        .nav-logo:hover {
            transform: rotate(15deg) scale(1.1);
        }

        .nav-item {
            color: #94a3b8;
            font-size: 1.2rem;
            margin-bottom: 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-item:hover, .nav-item.active {
            color: var(--accent-primary);
        }

        /* Main Content */
        .main-container {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 3rem;
            max-width: 1400px;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            margin-bottom: 3rem;
        }

        .search-container {
            position: relative;
            width: 550px;
        }

        .search-container i {
            position: absolute;
            left: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
        }

        .search-input {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            padding: 1.2rem 1.2rem 1.2rem 4rem;
            border-radius: 20px;
            color: var(--text-main);
            font-size: 1.1rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: var(--shadow-soft);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1), var(--shadow-soft);
        }

        /* Featured Banner */
        .featured-banner {
            width: 100%;
            height: 480px;
            border-radius: 40px;
            background: linear-gradient(135deg, rgba(255,255,255,0.98) 25%, rgba(255,255,255,0.3) 100%), url('assets/cyberpunk_banner.png');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 6rem;
            margin-bottom: 4rem;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-strong);
        }

        .featured-tag {
            font-size: 0.85rem;
            letter-spacing: 4px;
            color: var(--accent-primary);
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 1.2rem;
        }

        .featured-title {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            max-width: 600px;
            line-height: 1;
            color: #000;
        }

        .featured-desc {
            color: var(--text-dim);
            font-size: 1.2rem;
            max-width: 500px;
            margin-bottom: 3rem;
            line-height: 1.7;
        }

        .btn-play {
            background: #000;
            color: #fff;
            padding: 1.4rem 4rem;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 800;
            font-size: 1.1rem;
            width: fit-content;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .btn-play:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            background: var(--accent-primary);
        }

        /* Game Grid */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 3.5rem;
        }

        .game-card {
            background: transparent;
            cursor: pointer;
            position: relative;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .poster-container {
            width: 100%;
            aspect-ratio: 3/4;
            border-radius: 30px;
            overflow: hidden;
            margin-bottom: 1.5rem;
            border: 1px solid var(--glass-border);
            position: relative;
            background: #fff;
            box-shadow: var(--shadow-soft);
        }

        .poster-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s ease;
        }

        .game-card:hover .poster-img {
            transform: scale(1.08);
        }

        .game-card.selected .poster-container {
            border: 3px solid var(--accent-primary);
            padding: 4px;
        }

        .game-info {
            padding: 0 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .game-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: #0f172a;
        }

        .game-meta {
            font-size: 0.95rem;
            color: #64748b;
            display: flex;
            justify-content: space-between;
            font-weight: 600;
        }

        .rating { color: #b45309; }

        @media (max-width: 900px) {
            .sidebar { display: none; }
            .main-container { margin-left: 0; padding: 1.5rem; }
            .featured-banner { height: 400px; padding: 3rem; }
            .featured-title { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="nav-logo"><i class="fas fa-gamepad"></i></div>
        <div class="nav-item active"><i class="fas fa-home"></i></div>
        <div class="nav-item"><i class="fas fa-layer-group"></i></div>
        <div class="nav-item"><i class="fas fa-users"></i></div>
        <div class="nav-item" style="margin-top: auto;"><i class="fas fa-cog"></i></div>
    </nav>

    <main class="main-container">
        <div class="top-bar">
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" id="gameSearch" class="search-input" placeholder="¿Qué quieres jugar hoy?">
            </div>
        </div>

        <section id="mainBanner" class="featured-banner">
            <span id="bannerTag" class="featured-tag">Bienvenido</span>
            <h1 id="bannerTitle" class="featured-title">ALGORAH<br>GAMES HUB</h1>
            <p id="bannerDesc" class="featured-desc">Selecciona un título de nuestra biblioteca curada para comenzar tu experiencia.</p>
            <a href="#" id="bannerBtn" class="btn-play" style="display: none;">
                COMENZAR <i class="fas fa-chevron-right"></i>
            </a>
        </section>

        <div class="game-grid" id="gameGrid"></div>
    </main>

    <script>
        const games = [
            {
                id: 'stop',
                title: 'STOP!',
                tag: 'Multijugador / Estrategia',
                desc: 'Agilidad mental en tiempo real. Un clásico reimaginado con un diseño minimalista y moderno.',
                poster: 'assets/stop_poster.png',
                url: '/stop/',
                rating: '4.9',
                ping: '12ms'
            },
            {
                id: 'tictactoe',
                title: 'Tres en Línea',
                tag: 'Duelo / 1v1',
                desc: 'Estrategia pura. Batallas minimalistas de símbolos en un entorno de alta fidelidad visual.',
                poster: 'assets/tictactoe_poster.png',
                url: '/tictactoe/',
                rating: '4.5',
                ping: '18ms'
            },
            {
                id: 'adivina',
                title: 'Adivina Quién',
                tag: 'Social / Grupal',
                desc: 'Diversión asegurada. Pistas, risas y misterio en esta versión premium del clásico "Heads Up".',
                poster: 'assets/adivina_poster.png',
                url: '/adivina/',
                rating: '4.8',
                ping: '22ms'
            },
            {
                id: 'bomba',
                title: 'Bomba Caliente',
                tag: 'Tensión / Fiesta',
                desc: '¡Que no te explote! Piensa rápido, di la palabra y pasa la bomba antes de que sea demasiado tarde.',
                poster: 'assets/bomba_poster.png',
                url: '/bomba/',
                rating: '4.9',
                ping: '10ms'
            },
            {
                id: 'pictionary',
                title: 'Pictionary',
                tag: 'Creatividad / Grupal',
                desc: '¡Dibuja y adivina! Pon a prueba tu talento artístico y tu rapidez mental en este duelo de trazos.',
                poster: 'assets/pictionary_poster.png',
                url: '/pictionary/',
                rating: '4.7',
                ping: '15ms'
            }
        ];

        const grid = document.getElementById('gameGrid');
        const banner = document.getElementById('mainBanner');
        const bannerTag = document.getElementById('bannerTag');
        const bannerTitle = document.getElementById('bannerTitle');
        const bannerDesc = document.getElementById('bannerDesc');
        const bannerBtn = document.getElementById('bannerBtn');
        const searchInput = document.getElementById('gameSearch');

        function renderGames(filter = '') {
            grid.innerHTML = '';
            const filtered = games.filter(g => g.title.toLowerCase().includes(filter.toLowerCase()));
            filtered.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `
                    <div class="poster-container">
                        <img src="${game.poster}" class="poster-img" alt="${game.title}">
                    </div>
                    <div class="game-info">
                        <span class="game-title">${game.title}</span>
                        <div class="game-meta">
                            <span class="rating"><i class="fas fa-star"></i> ${game.rating}</span>
                            <span><i class="fas fa-wifi"></i> ${game.ping}</span>
                        </div>
                    </div>
                `;
                card.onclick = () => selectGame(game, card);
                grid.appendChild(card);
            });
        }

        function selectGame(game, element) {
            document.querySelectorAll('.game-card').forEach(c => c.classList.remove('selected'));
            element.classList.add('selected');
            bannerTag.textContent = game.tag;
            bannerTitle.textContent = game.title;
            bannerDesc.textContent = game.desc;
            bannerBtn.href = game.url;
            bannerBtn.style.display = 'flex';
            banner.style.backgroundImage = `linear-gradient(135deg, rgba(255,255,255,0.98) 25%, rgba(255,255,255,0.3) 100%), url('${game.poster}')`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        searchInput.oninput = (e) => renderGames(e.target.value);
        renderGames();
    </script>
</body>
</html>
